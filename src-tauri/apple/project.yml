name: UnthinkExtensions
options:
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
targets:
  UnthinkIntents:
    type: app-extension
    platform: macOS
    sources:
      - Shared
      - Intents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.awkj.unthink.intents
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.appintents-extension
  UnthinkWidget:
    type: app-extension
    platform: macOS
    sources:
      - Shared
      - Widget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.awkj.unthink.widget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
